"Mutation root"
type Mutation {
  Producer: ProducerMutation
  Wine: WineMutation
}

type Producer {
  createdAt: String
  description: String
  email: String
  id: ID
  logo: [Int]
  name: String
  phone: String
  slug: String
  social: [SocialPlatform]
  website: String
  wineCount: Int!
  "Wines for the given producer"
  wines: [Wine]
}

type ProducerMutation {
  addProducer(producer: ProducerInput!): Producer
}

type ProducerQuery {
  "All producers"
  all: [Producer]
  "Producer by its ID"
  producer(id: ID!): Producer
  "Producer by its slug"
  producerBySlug(slug: String!): Producer
  "Producers for a given area"
  producers(areaId: ID!): [Producer]
}

"Query root"
type Query {
  Producer: ProducerQuery
  Wine: WineQuery
}

type SocialPlatform {
  provider: Provider
  url: String
}

type Wine {
  createdAt: String
  description: String
  id: ID
  matchCount: Int!
  name: String
  producer: WineProducer
  retailers: [WineRetailer]
  slug: String
  "Can be a single varietal (grape) or blend"
  varietal: String
  vintage: Int
}

type WineMutation {
  "Add wine to a producer"
  addWine(input: WineInput!): Wine
}

type WineProducer {
  id: ID
  name: String
  slug: String
}

type WineQuery {
  "Wine by its ID"
  wine(id: ID!): Wine
  "Wine by its slug fully enriched with producer and retailer data"
  wineBySlug(slug: String!): Wine
}

type WineRetailer {
  id: ID
  name: String
  source: String
  sourceId: String
}

enum Closure {
  NATURAL_CORK
  OTHER
  SCREW_CAP
  SYNTHETIC_CORK
  TECHNICAL_CORK
  VALVE
  VINO_SEAL
  ZORK
}

enum Color {
  ORANGE
  RED
  ROSE
  WHITE
}

enum Provider {
  FACEBOOK
  INSTAGRAM
  TWITTER
}

enum Shape {
  ALSACE
  BORDEAUX
  BOX
  BURGUNDY
  CALIFORNIA
  CHAMPAGNE
  OTHER
  RHONE
}

enum Type {
  FRIZZANTE
  SPARKLING
  STILL
}

input ProducerInput {
  areaId: ID!
  description: String
  email: String
  logo: [Int]
  name: String!
  phone: String
  socialLinks: [SocialPlatformInput]
  website: String
}

input SocialPlatformInput {
  provider: Provider
  url: String
}

input WineInput {
  "Total acidity level (e.g. '5.6')"
  acid: Float
  "Alcohol content as a percent string (e.g. '13.5')"
  alcohol: Float
  "Bottle aging duration in months (e.g. '12')"
  bottleAging: Int
  "Closure type (e.g. CORK, SCREWCAP)"
  closure: Closure
  "Color of the wine (e.g. RED, WHITE, ROSE)"
  color: Color
  "Optional general description of the wine"
  description: String
  "Wine name or label (e.g. 'Château Margaux')"
  name: String!
  "pH value of the wine (e.g. '3.4')"
  pH: Float
  "ID of the producer this wine will belong to"
  producerId: ID!
  "Shape of the bottle (e.g. BORDEAUX, BURGUNDY)"
  shape: Shape
  "Bottle size in milliliters (e.g. '0.75 or 1.0')"
  size: Float
  "Optional subarea or vineyard designation (e.g. 'Howell Mountain')"
  subarea: String
  "Wine type (e.g. STILL, SPARKLING)"
  type: Type
  "Can be a single varietal (grape) or a blend"
  varietal: String!
  "Vintage year of the wine (e.g. '2020')"
  vintage: Int!
}
