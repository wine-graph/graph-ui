app = 'winegraph'
primary_region = 'iad'

[build]

[http_service]
internal_port = 80
force_https = true
auto_stop_machines = "suspend"
auto_start_machines = true
min_machines_running = 1
processes = ['app']

[http_service.concurrency]
type = 'requests'
hard_limit = 25
soft_limit = 20

[[http_service.checks]]
grace_period = "5s"
interval = "30s"
method = "GET"
timeout = "2s"
path = "/"

[[vm]]
memory = '1gb'
cpu_kind = 'shared'
cpus = 1
