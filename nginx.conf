server {
  listen 80;
  server_name _;

  if ($host = "winegraph.fly.dev") {
    return 301 https://app.winegraph.io$request_uri;
  }

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  # Optional: tighten body size / basic caching
  client_max_body_size 2m;
}